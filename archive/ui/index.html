<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pentect</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --ph: #ff7b72;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
      }
      .topbar {
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .topbar h1 { margin: 0; font-size: 16px; font-weight: 600; }
      .topbar .tag { color: var(--muted); font-size: 12px; }
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
        min-height: 0;
      }
      .pane {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel);
        overflow: hidden;
        min-height: 0;
      }
      textarea, pre {
        flex: 1;
        margin: 0;
        padding: 12px;
        background: transparent;
        color: var(--fg);
        border: 0;
        outline: 0;
        resize: none;
        font: inherit;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-all;
        overflow: auto;
      }
      .bar {
        display: flex;
        gap: 8px;
        padding: 8px;
        border-top: 1px solid var(--border);
        align-items: center;
      }
      button {
        background: var(--accent);
        color: #0d1117;
        border: 0;
        padding: 6px 14px;
        border-radius: 5px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { color: var(--muted); font-size: 12px; margin-left: auto; }
      .ph { color: var(--ph); }
      .empty { color: var(--muted); }
      select {
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 5px 8px;
        font: inherit;
        font-size: 12px;
      }
      .field { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Pentect</h1>
    </div>
    <main>
      <section class="pane">
        <textarea id="input" placeholder="Paste text or HAR here..." spellcheck="false"></textarea>
        <div class="bar">
          <button id="run">Mask</button>
          <button id="sample" class="secondary">Sample</button>
          <span class="field">backend</span>
          <select id="backend">
            <option value="rule">rule (no model)</option>
            <option value="opf_pf">privacy filter FT</option>
            <option value="gemma">gemma 4B FT</option>
            <option value="hybrid">hybrid (PF + gemma audit)</option>
          </select>
          <span class="status" id="status"></span>
        </div>
      </section>
      <section class="pane">
        <pre id="output" class="empty">Output</pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
