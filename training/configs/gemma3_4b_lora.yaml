base_model: google/gemma-3-4b-it
dataset_path: training/data/train.instruct.jsonl
output_dir: training/runs/gemma3_4b_lora
epochs: 3
batch_size: 2
grad_accum: 8
learning_rate: 2e-4
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
max_seq_length: 1024
seed: 42
load_in_4bit: true
